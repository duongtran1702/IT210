<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{main-layout}" lang="en">
<head>
    <title>Lỗi - Không tìm thấy</title>
</head>
<body>

<div layout:fragment="content" class="text-center py-20">
    <div class="bg-white p-10 rounded-xl shadow-lg max-w-lg mx-auto">
        <div class="text-red-500 mb-4">
            <svg class="w-20 h-20 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>
        <h2 class="text-3xl font-bold text-gray-800 mb-2">Thông báo lỗi</h2>
        <p class="text-gray-600 mb-6" th:text="${errorMessage}">Nội dung lỗi mặc định (Mock Data)</p>

        <a th:href="@{/bai2/dish-list}"
           class="inline-block bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition">
            Quay lại danh sách
        </a>
    </div>
</div>

</body>
</html>
