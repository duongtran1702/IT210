<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa món ăn</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body >

<div layout:fragment="content" class="flex items-center justify-center p-4 mt-10">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md" >

        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center border-b pb-4">
            Chỉnh sửa món ăn
        </h2>

        <form th:action="@{/bai3/edit}" th:object="${dish}" method="post" class="space-y-5">

            <div>
                <label for="dishId" class="block text-sm font-medium text-gray-700 mb-1">ID Món ăn:</label>
                <input type="text" th:field="*{id}" id="dishId" readonly
                       class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-md text-gray-500 cursor-not-allowed outline-none"/>
            </div>

            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Tên món:</label>
                <input type="text" th:field="*{name}" id="name" placeholder="Nhập tên món ăn"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"/>
            </div>

            <div>
                <label for="price" class="block text-sm font-medium text-gray-700 mb-1">Giá tiền (VNĐ):</label>
                <input type="number" th:field="*{price}" id="price" step="1000"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"/>
            </div>

            <div class="flex items-center gap-3 py-2">
                <input type="checkbox" th:field="*{available}" id="available"
                       class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"/>
                <label for="available" class="text-sm font-medium text-gray-700 cursor-pointer">
                    Đang phục vụ (Available)
                </label>
            </div>

            <div class="flex flex-col gap-3 pt-4">
                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-md shadow transition duration-200">
                    Lưu thay đổi
                </button>

                <a th:href="@{/bai2/dish-list}"
                   class="text-center text-sm text-gray-500 hover:text-gray-700 transition">
                    Quay lại danh sách
                </a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
