<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Danh sách món ăn - Atmin Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div layout:fragment="content" class="max-w-5xl mx-auto mt-10 p-6">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-extrabold text-gray-800">
            Danh sách món ăn
        </h2>
        <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">
            <span th:text="${dishes != null ? dishes.size() : 0}">0</span> món ăn
        </span>
    </div>

    <div th:if="${dishes == null or #lists.isEmpty(dishes)}"
         class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4 text-center">
        <p class="text-yellow-700 font-medium">Hiện tại nhà hàng đang cập nhật thực đơn, vui lòng quay lại sau!</p>
    </div>

    <div class="overflow-hidden rounded-xl shadow-lg border border-gray-200" th:if="${dishes != null and !#lists.isEmpty(dishes)}">
        <table class="w-full text-sm text-left text-gray-500 bg-white">
            <thead class="text-xs text-white uppercase bg-blue-600 text-center">
            <tr>
                <th class="px-6 py-4">ID</th>
                <th class="px-6 py-4">Tên món ăn</th>
                <th class="px-6 py-4">Đơn giá</th>
                <th class="px-6 py-4">Trạng thái</th>
                <th class="px-6 py-4">Thao tác</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 text-center">
            <tr th:each="d : ${dishes}" class="hover:bg-blue-50 transition-colors duration-200">
                <td class="px-6 py-4 font-bold text-gray-700" th:text="${'#' + d.id}"></td>
                <td class="px-6 py-4 text-gray-900 font-medium text-left" th:text="${d.name}"></td>
                <td class="px-6 py-4 font-semibold text-blue-600">
                    <span th:text="${#numbers.formatDecimal(d.price, 0, 'POINT', 0, 'POINT')}"></span>đ
                </td>
                <td class="px-6 py-4">
                        <span th:if="${d.available}"
                              class="px-3 py-1 text-xs font-medium bg-green-100 text-green-700 rounded-full">
                            Còn hàng
                        </span>
                    <span th:unless="${d.available}"
                          class="px-3 py-1 text-xs font-medium bg-red-100 text-red-700 rounded-full">
                            Hết hàng
                        </span>
                </td>
                <td class="px-6 py-4 flex justify-center gap-2">
                    <a th:href="@{/bai3/edit/{id}(id=${d.id})}"
                       class="flex items-center bg-yellow-400 text-white px-3 py-1.5 rounded-lg hover:bg-yellow-500 transition shadow-sm">
                        Sửa
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
