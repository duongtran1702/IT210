<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sinh viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        table { border-collapse: collapse; }
        th, td { border: 1px solid #d1d5db; padding: 12px; }
        th { background: #e5e7eb; }
    </style>
</head>
<body class="bg-gray-100 p-6">
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Danh sách sinh viên</h1>
        <a th:href="@{/add-student}" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">+ Thêm mới</a>
    </div>
    <div class="bg-white rounded-lg shadow overflow-auto">
        <table class="w-full">
            <thead>
                <tr>
                    <th class="text-left">ID</th>
                    <th class="text-left">Tên</th>
                    <th class="text-left">Tuổi</th>
                    <th class="text-left">Giới tính</th>
                    <th class="text-center">Ảnh</th>
                    <th class="text-center">Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="student : ${students}" class="hover:bg-gray-50">
                    <td th:text="${student.id}"></td>
                    <td th:text="${student.name}"></td>
                    <td th:text="${student.age}"></td>
                    <td th:text="${student.gender}"></td>
                    <td class="text-center">
                        <img th:if="${student.avatar}" th:src="@{|/images/${student.avatar}|}" class="w-12 h-12 rounded" alt="">
                    </td>
                    <td class="text-center">
                        <a th:href="@{/edit/{id}(id=${student.id})}" class="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700">Sửa</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(students)}">
                    <td colspan="6" class="text-center text-gray-500 py-8">Không có dữ liệu</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
