<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="bg-white p-8 rounded-lg shadow-md w-80 text-center">
    <h2 class="text-xl font-bold mb-6">Tải ảnh hệ thống</h2>

    <form th:action="@{/upload/process}" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required class="w-full mb-4 p-2 border rounded">
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 font-medium">Tải lên</button>
    </form>

    <p th:if="${error}" th:text="${error}" class="text-red-500 text-sm mt-4"></p>
</div>
</body>
</html>
