<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Thông tin sinh viên</h2>

    <form th:object="${student}" method="post" class="space-y-4">

        <div>
            <label class="block text-sm font-medium text-gray-700" for="id">ID</label>
            <input type="text" th:field="*{id}" id="id" th:disabled="*{id!=null}"
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                   placeholder="Nhập ID...">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700" for="name">Tên sinh viên</label>
            <input type="text" th:field="*{name}" id="name"
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                   placeholder="Nguyễn Văn A">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700" for="age">Tuổi</label>
            <input type="number" th:field="*{age}" id="age"
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700" for="gender">Giới tính</label>
            <select th:field="*{gender}" id="gender"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                <option value="MALE">Nam</option>
                <option value="FEMALE">Nữ</option>
                <option value="OTHER">Khác</option>
            </select>
        </div>

        <div class="pt-4">
            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 font-semibold">
                Lưu dữ liệu
            </button>
        </div>
    </form>
</div>
</body>
</html>
