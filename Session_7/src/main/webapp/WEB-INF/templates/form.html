<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin sinh viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="w-full max-w-md bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6">Thông tin sinh viên</h2>

    <form th:object="${student}" th:action="@{/add-student}" method="post" enctype="multipart/form-data">
        <div th:if="${error}" class="bg-red-100 text-red-700 p-3 rounded mb-4">
            <p th:text="${error}"></p>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium mb-2" for="id">ID</label>
            <input type="text" th:field="*{id}" th:disabled="*{id!=null}" id="id" class="w-full px-3 py-2 border rounded">
            <input type="hidden" th:if="*{id!=null}" th:field="*{id}">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium mb-2" for="name">Tên</label>
            <input type="text" th:field="*{name}" required id="name" class="w-full px-3 py-2 border rounded">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium mb-2" for="age">Tuổi</label>
            <input type="number" th:field="*{age}" required id="age" class="w-full px-3 py-2 border rounded">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium mb-2" for="gender">Giới tính</label>
            <select th:field="*{gender}" id="gender" class="w-full px-3 py-2 border rounded">
                <option value="">-- Chọn --</option>
                <option value="MALE">Nam</option>
                <option value="FEMALE">Nữ</option>
                <option value="OTHER">Khác</option>
            </select>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium mb-2">Ảnh</label>
            <input type="file" th:field="*{avatar}" accept="image/*" class="w-full">
        </div>

        <div class="flex gap-3">
            <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded font-medium hover:bg-blue-700">Lưu</button>
            <a th:href="@{/}" class="flex-1 bg-gray-400 text-white py-2 rounded font-medium text-center hover:bg-gray-500">Hủy</a>
        </div>
    </form>
</div>
</body>
</html>
